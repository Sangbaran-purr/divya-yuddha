<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Divya Yuddha — Prototype v0.1</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#E8C874; --gold-2:#C9A84C; --gold-dim:#8a7434;
  --ink:#e8ddc0; --ink-dim:#cbbd96;
  --panel:#201808; --line:#3a2e14; --hi:#F0D080;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  color:var(--ink); font-family:'Crimson Pro',Georgia,serif; display:flex; justify-content:center;
  background:
    radial-gradient(120% 78% at 50% 0%, rgba(74,52,16,.20), transparent 62%),
    linear-gradient(#16110a, #0a0603);
  background-attachment:fixed;
}
/* CSS-only mandala texture */
body::before{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0; opacity:.05;
  background:repeating-radial-gradient(circle at 50% 40%, rgba(201,168,76,.65) 0 1px, transparent 1px 26px);
  -webkit-mask:radial-gradient(circle at 50% 40%, #000, transparent 72%);
  mask:radial-gradient(circle at 50% 40%, #000, transparent 72%);
}
#app{ position:relative; z-index:1; width:100%; max-width:520px; min-height:100vh; min-height:100dvh;
  display:flex; flex-direction:column; overflow:hidden;
  border-left:1px solid var(--line); border-right:1px solid var(--line);
  background:linear-gradient(rgba(20,15,8,.72),rgba(11,7,4,.72)); }

header{ padding:8px 12px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; background:linear-gradient(#1b140a,#120d06); position:relative; z-index:6; }
.title{ font-family:Cinzel,serif; font-size:14px; letter-spacing:2px; color:var(--gold); font-weight:600; }
.title small{ display:block; font-size:9px; letter-spacing:3px; color:var(--ink-dim); font-weight:400; }
.roundbox{ text-align:right; font-family:Cinzel,serif; font-size:11px; color:var(--ink-dim); }
.pips{ letter-spacing:3px; font-size:13px; }
.pip-w{ color:var(--gold); } .pip-l{ color:#5a4a28; }

/* battlefield */
#field{ position:relative; flex:1; display:flex; flex-direction:column; overflow:hidden; }
#embers{ position:absolute; inset:0; pointer-events:none; z-index:2; overflow:hidden; }
.ember{ position:absolute; bottom:-8px; border-radius:50%; opacity:0;
  background:radial-gradient(circle, #ffe9a8, #C9A84C 60%, transparent 72%);
  animation:emberRise linear infinite; }
@keyframes emberRise{
  0%{ transform:translateY(0) scale(.8); opacity:0; }
  12%{ opacity:.7; } 85%{ opacity:.45; }
  100%{ transform:translateY(-44vh) scale(1.1); opacity:0; }
}
.half{ position:relative; flex:1; min-height:0; display:flex; flex-direction:column; z-index:3; overflow:hidden; }
.half.opp{ background:radial-gradient(130% 92% at 50% -12%, rgba(122,26,22,.34), transparent 62%); }
.half.me{  background:radial-gradient(130% 92% at 50% 112%, rgba(150,112,36,.30), transparent 62%); }
/* thin sticky zone header */
.zhead{ flex:0 0 auto; position:sticky; top:0; z-index:4; padding:3px 70px 3px 10px;
  font-family:Cinzel,serif; font-size:9px; letter-spacing:2px; color:var(--ink-dim);
  background:linear-gradient(#160f07, rgba(20,14,7,.35)); border-bottom:1px solid #241c0e; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
/* rows scroll WITHIN their half — never grow over another zone */
.zbody{ flex:1 1 auto; min-height:0; overflow-y:auto; display:flex; flex-direction:column; gap:2px; padding:2px 70px 2px 8px; scrollbar-width:none; }
.zbody::-webkit-scrollbar{ display:none; }
.half.opp .zbody{ justify-content:flex-end; }   /* opponent cards hug the divider */
.half.me  .zbody{ justify-content:flex-start; }  /* my cards hug the divider */
/* only when minis can't shrink to fit (very short screens): scroll within the zone with a fade affordance */
.half.scrollzone .zbody{ justify-content:flex-start; -webkit-mask:linear-gradient(#000 82%, transparent); mask:linear-gradient(#000 82%, transparent); }

#divider{ position:relative; height:2px; z-index:4; overflow:hidden;
  background:linear-gradient(90deg, transparent, var(--gold-dim) 12%, var(--gold) 50%, var(--gold-dim) 88%, transparent);
  box-shadow:0 0 8px rgba(232,200,116,.4); }
#divider::after{ content:''; position:absolute; inset:0;
  background:linear-gradient(90deg, transparent 42%, rgba(255,244,200,.95) 50%, transparent 58%);
  background-size:250% 100%; animation:shimmer 4.5s linear infinite; }
@keyframes shimmer{ 0%{ background-position:160% 0; } 100%{ background-position:-160% 0; } }

/* SCORE HUD — fixed on the right edge of the battlefield column, above everything */
#hudwrap{ position:fixed; inset:0; z-index:95; display:flex; justify-content:center; pointer-events:none; }
#hudcol{ position:relative; width:100%; max-width:520px; }
#hud{ position:absolute; right:5px; top:50%; transform:translateY(-50%); width:58px; display:flex; flex-direction:column; align-items:center; gap:6px; pointer-events:auto; }
.hud-plaque{ width:56px; height:50px; border-radius:12px; display:flex; align-items:center; justify-content:center;
  background:radial-gradient(circle at 50% 32%, #241a0a, #0e0904); border:1px solid var(--gold);
  box-shadow:0 2px 8px rgba(0,0,0,.65); transition:box-shadow .25s; }
.hud-total{ font-family:Cinzel,serif; font-size:30px; font-weight:700; color:var(--hi); line-height:1; text-shadow:0 1px 0 #140d04; }
.hud-plaque.leading{ border-color:#ffe9a8; box-shadow:0 0 14px rgba(240,208,128,.6), 0 2px 8px rgba(0,0,0,.65); }
.hud-plaque.pulse{ animation:hudPulse .5s ease-out; }
@keyframes hudPulse{ 0%{ transform:scale(1); } 42%{ transform:scale(1.18); } 100%{ transform:scale(1); } }
.hud-pips{ font-size:12px; letter-spacing:1px; text-align:center; line-height:1.1; }

.row{ display:flex; gap:6px; overflow-x:auto; overflow-y:visible; min-height:0; padding:3px 0; align-items:center; scrollbar-width:none; }
.row.empty{ min-height:0; }
.row::-webkit-scrollbar{ display:none; }

/* board mini — art-first, no name strip */
.bc{ flex:0 0 auto; height:var(--mini-h,90px); width:calc(var(--mini-h,90px)*0.75); background:var(--panel); border:1px solid var(--line); border-radius:7px; position:relative; overflow:hidden; cursor:pointer; }
.bc .art{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; }
.bc .mini-name{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; text-align:center; padding:3px; z-index:1;
  font-family:Cinzel,serif; font-size:9px; font-weight:600; line-height:1.15; color:var(--ink); }
.bc.has-art .mini-name{ display:none; }
.bc.hero{ border-color:var(--gold-dim); }
.bc.ghostc{ opacity:.6; border-style:dashed; }
.shieldbadge{ position:absolute; top:2px; right:3px; font-size:12px; z-index:3; filter:drop-shadow(0 1px 1px #000); }
.medallion{ position:absolute; right:2px; bottom:2px; width:23px; height:23px; border-radius:50%; z-index:3;
  background:radial-gradient(circle at 40% 34%, #2b2110, #120c04); border:1px solid var(--gold);
  box-shadow:0 1px 3px rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center;
  font-family:Cinzel,serif; font-size:13px; font-weight:700; color:var(--hi); }
.medallion.buffed{ border-color:#5fd06f; box-shadow:0 0 7px rgba(95,208,111,.55); }
.medallion.hurt{ border-color:#e05a4a; box-shadow:0 0 7px rgba(224,90,74,.55); }
.medallion .mark{ position:absolute; top:-9px; right:-3px; font-size:9px; }
.medallion.buffed .mark{ color:#5fd06f; } .medallion.hurt .mark{ color:#e05a4a; }
.bc.targetable{ outline:2px solid var(--gold); outline-offset:1px; z-index:6; animation:pulse 1s infinite alternate; }
@keyframes pulse{ from{ outline-color:#e0b040; box-shadow:0 0 6px #c9a84c; } to{ outline-color:#fff0c0; box-shadow:0 0 15px #ffe9a8; } }
.bc.landing{ animation:land .45s ease-out; }
@keyframes land{ 0%{ transform:scale(.82); box-shadow:0 0 0 0 rgba(255,233,168,.9);} 45%{ box-shadow:0 0 0 4px rgba(255,233,168,.75);} 100%{ transform:scale(1); box-shadow:0 0 0 0 rgba(255,233,168,0);} }
.slot-empty{ flex:1; min-height:24px; display:flex; align-items:center; justify-content:center; color:#6a5730; opacity:.55; font-size:13px; }

.art-slot{ display:flex; gap:6px; align-items:center; justify-content:center; min-height:0; }
.art-chip{ font-size:10px; font-family:Cinzel,serif; color:var(--gold); border:1px solid var(--gold-dim); border-radius:4px; padding:2px 8px; background:#1a1408; }

/* floating combat text */
.floater{ position:fixed; z-index:66; font-family:Cinzel,serif; font-weight:700; font-size:16px; pointer-events:none; text-shadow:0 1px 2px #000; animation:floatUp .6s ease-out forwards; }
.floater.up{ color:#6fe07e; } .floater.down{ color:#ff6a58; }
@keyframes floatUp{ 0%{ transform:translateY(0); opacity:0; } 22%{ opacity:1; } 100%{ transform:translateY(-26px); opacity:0; } }

/* hand carousel */
#handwrap{ position:relative; z-index:5; padding:2px 0; }
#hand{ display:flex; gap:10px; overflow-x:auto; scroll-snap-type:x mandatory; padding:14px calc(50% - 66px) 16px; scrollbar-width:none; }
#hand::-webkit-scrollbar{ display:none; }
.hc{ flex:0 0 auto; width:132px; aspect-ratio:3/4; scroll-snap-align:center; position:relative; overflow:hidden;
  background:linear-gradient(#221a0a,#140f06); border:2px solid #4a3a18; border-radius:12px; cursor:pointer;
  transform:scale(.9); opacity:.72; transition:transform .18s ease, opacity .18s ease, box-shadow .18s ease; }
.hc.focus{ transform:scale(1.06); opacity:1; box-shadow:0 8px 20px rgba(0,0,0,.55); border-color:var(--gold-dim); }
.hc:active{ transform:scale(1.02); }
.hc.dead{ filter:grayscale(.55) brightness(.78); }
.hc .art{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; }
.hc .cardtext{ position:absolute; inset:0; display:flex; flex-direction:column; padding:9px; z-index:1; }
.hc.has-art .cardtext{ display:none; }
.hc .nm{ font-family:Cinzel,serif; font-size:12px; font-weight:700; color:var(--gold); line-height:1.15; }
.hc .ty{ font-size:8px; letter-spacing:1px; color:var(--ink-dim); font-family:Cinzel,serif; text-transform:uppercase; margin:4px 0; }
.hc .fx{ font-size:9px; line-height:1.3; color:var(--ink-dim); flex:1; overflow:hidden; }
.hc .pw{ position:absolute; bottom:5px; right:9px; font-family:Cinzel,serif; font-size:18px; font-weight:700; color:var(--hi); text-shadow:0 1px 2px #000; z-index:2; }
.hc .lockicon{ position:absolute; top:5px; right:8px; font-size:13px; z-index:2; }
/* rarity treatments — animated only on focused hand card + inspect */
.rar-L::after{ content:''; position:absolute; inset:0; z-index:2; pointer-events:none;
  background:linear-gradient(115deg, transparent 42%, rgba(255,244,200,.5) 50%, transparent 58%); background-size:280% 280%; }
.hc.focus.rar-L::after, .inspect-card.rar-L::after{ animation:legend 4s linear infinite; }
@keyframes legend{ 0%{ background-position:170% 0; } 100%{ background-position:-170% 0; } }
.hc.focus.rar-M, .inspect-card.rar-M{ animation:mythic 2.4s ease-in-out infinite; }
@keyframes mythic{ 0%,100%{ box-shadow:inset 0 0 8px rgba(231,76,60,.28);} 50%{ box-shadow:inset 0 0 20px rgba(231,76,60,.6);} }
.rar-E::before{ content:''; position:absolute; top:0; right:0; width:44%; height:44%; z-index:2; pointer-events:none;
  background:radial-gradient(circle at 100% 0, rgba(155,89,182,.4), transparent 70%); }

/* log drawer */
#logdrawer{ position:relative; z-index:5; background:#0d0a05; border-top:1px solid var(--line); cursor:pointer; }
.loghead{ display:flex; align-items:center; gap:8px; padding:5px 12px; font-family:Cinzel,serif; font-size:9px; letter-spacing:2px; color:var(--ink-dim); }
.loghead #loglast{ flex:1; font-size:11px; letter-spacing:0; color:var(--ink-dim); font-style:italic; font-family:'Crimson Pro',serif; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#logtoggle{ transition:transform .25s; }
#logdrawer.open #logtoggle{ transform:rotate(180deg); }
#logdrawer.open #loglast{ display:none; }
#logbody{ max-height:0; overflow-y:auto; transition:max-height .25s ease; padding:0 12px; font-size:12px; line-height:1.5; color:var(--ink-dim); }
#logdrawer.open #logbody{ max-height:32vh; padding:2px 12px 8px; }
#logbody .me{ color:#e8d49a; } #logbody .foe{ color:#c9a88a; } #logbody .sys{ color:#a68c3c; font-style:italic; }
#logbody::-webkit-scrollbar{ width:4px; } #logbody::-webkit-scrollbar-thumb{ background:#33280f; }

/* controls */
#controls{ display:flex; gap:10px; align-items:center; z-index:5; position:relative;
  padding:6px 12px calc(8px + env(safe-area-inset-bottom)); background:linear-gradient(#120d06,#0b0704); border-top:1px solid var(--line); }
button{ font-family:Cinzel,serif; letter-spacing:1px; }
#turnind{ font-size:11px; color:var(--ink-dim); font-family:Cinzel,serif; min-width:86px; text-align:center; }
#turnind.you{ color:var(--hi); text-shadow:0 0 10px rgba(240,208,128,.6); }
#passbtn{ flex:1; background:linear-gradient(#2a1e0a,#1d1507); color:var(--gold); border:1.5px solid var(--gold-dim); border-radius:10px; padding:13px; font-size:13px; font-weight:700; cursor:pointer; transition:transform .1s, box-shadow .15s, background .15s; }
#passbtn:hover:not(:disabled){ background:linear-gradient(#3a2a0e,#241a08); box-shadow:0 0 12px rgba(201,168,76,.3); }
#passbtn:active:not(:disabled){ transform:scale(.97); }
#passbtn:disabled{ opacity:.4; cursor:default; }

/* round-end banner */
#banner{ position:fixed; top:38%; left:0; right:0; z-index:70; text-align:center; pointer-events:none; }
#banner .txt{ display:inline-block; font-family:Cinzel,serif; font-size:19px; letter-spacing:3px; font-weight:700; color:var(--hi);
  padding:10px 26px; background:linear-gradient(90deg, transparent, rgba(40,28,10,.92), transparent);
  border-top:1px solid var(--gold-dim); border-bottom:1px solid var(--gold-dim); text-shadow:0 0 12px rgba(240,208,128,.55); }
@keyframes bannerSweep{ 0%{ transform:translateX(-18px); opacity:0; } 18%{ opacity:1; } 82%{ opacity:1; } 100%{ transform:translateX(18px); opacity:0; } }

/* overlays */
.overlay{ position:fixed; inset:0; background:rgba(6,4,1,.9); display:flex; align-items:center; justify-content:center; z-index:80; padding:20px; }
.modal{ background:var(--panel); border:1px solid var(--gold-dim); border-radius:12px; padding:18px; max-width:440px; width:100%; max-height:80vh; overflow-y:auto; }
.modal h3{ font-family:Cinzel,serif; color:var(--gold); font-size:14px; margin-bottom:10px; letter-spacing:1px; }
.modal .opts{ display:flex; flex-wrap:wrap; gap:8px; }
.modal .opt{ background:#181206; border:1px solid var(--gold-dim); border-radius:8px; padding:8px 10px; cursor:pointer; min-width:110px; }
.modal .opt .nm{ font-family:Cinzel,serif; font-size:11px; color:var(--gold); font-weight:700; }
.modal .opt .dt{ font-size:9px; color:var(--ink-dim); margin-top:2px; }
.modal .cancel{ margin-top:12px; background:none; border:1px solid #3a2f16; color:var(--ink-dim); border-radius:6px; padding:7px 14px; cursor:pointer; font-size:11px; }

/* inspect overlay */
#inspect{ flex-direction:column; gap:16px; }
.inspect-card{ position:relative; width:85vw; max-width:330px; aspect-ratio:3/4; border-radius:16px; overflow:hidden;
  border:2px solid var(--gold-dim); background:linear-gradient(#221a0a,#140f06); box-shadow:0 14px 44px rgba(0,0,0,.65); }
.inspect-card .art{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; }
.inspect-card .ipw{ position:absolute; top:12px; right:15px; z-index:3; font-family:Cinzel,serif; font-size:30px; font-weight:700; color:var(--hi); text-shadow:0 1px 4px #000; }
.inspect-card .itext{ position:absolute; left:0; right:0; bottom:0; z-index:2; padding:16px 18px; background:linear-gradient(transparent, rgba(8,5,1,.94) 42%); }
.inspect-card:not(.has-art) .itext{ inset:0; background:linear-gradient(#221a0a,#140f06); display:flex; flex-direction:column; justify-content:flex-end; }
.inspect-card .inm{ font-family:Cinzel,serif; font-size:19px; font-weight:700; color:var(--gold); }
.inspect-card .isub{ font-size:12px; color:var(--ink-dim); font-style:italic; margin-bottom:6px; }
.inspect-card .ity{ font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--ink-dim); font-family:Cinzel,serif; margin-bottom:9px; }
.inspect-card .ifx{ font-size:13px; line-height:1.42; color:var(--ink); }
.inspect-actions{ display:flex; gap:14px; }
.inspect-actions button{ padding:12px 30px; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; transition:transform .1s; }
.inspect-actions button:active{ transform:scale(.96); }
.ibtn-play{ background:linear-gradient(#3a2a0e,#241a08); color:var(--gold); border:1.5px solid var(--gold); }
.ibtn-cancel{ background:none; color:var(--ink-dim); border:1px solid #4a3a18; }
.inspect-hint{ font-family:Cinzel,serif; font-size:11px; letter-spacing:2px; color:var(--ink-dim); }

#gameover .modal{ text-align:center; }
#gameover h2{ font-family:Cinzel,serif; color:var(--gold); font-size:22px; letter-spacing:2px; margin-bottom:6px; }
#gameover p{ color:var(--ink-dim); font-size:13px; margin-bottom:14px; }
#gameover button{ background:#241a08; color:var(--gold); border:1.5px solid var(--gold-dim); border-radius:8px; padding:10px 22px; font-size:13px; cursor:pointer; }
.hidden{ display:none !important; }

@media (prefers-reduced-motion: reduce){
  .ember{ display:none; }
  #divider::after, .hc.focus.rar-L::after, .inspect-card.rar-L::after, .hc.focus.rar-M, .inspect-card.rar-M,
  .bc.landing, .floater, .bc.targetable, #banner .txt{ animation:none !important; }
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="title">DIVYA YUDDHA<small>PROTOTYPE v0.1 · DEVA MIRROR</small></div>
    <div class="roundbox">ROUND <span id="rnum">1</span></div>
  </header>

  <div id="field">
    <div id="embers"></div>
    <div class="half opp">
      <div class="zhead"><span>OPPONENT · HAND <span id="ohand">10</span> · DECK <span id="odeck">12</span><span id="opassed"></span></span></div>
      <div class="zbody">
        <div class="row hero-row" id="oheroes"></div>
        <div class="row" id="ounits"></div>
        <div class="art-slot"><span id="oart" class="art-chip hidden"></span></div>
      </div>
    </div>
    <div id="divider"></div>
    <div class="half me">
      <div class="zhead"><span>YOU · DECK <span id="pdeck">12</span><span id="ppassed"></span></span></div>
      <div class="zbody">
        <div class="art-slot"><span id="part" class="art-chip hidden"></span></div>
        <div class="row" id="punits"></div>
        <div class="row hero-row" id="pheroes"></div>
      </div>
    </div>
  </div>

  <div id="logdrawer">
    <div class="loghead" id="loghead"><span>⚔ LOG</span><span id="loglast"></span><span id="logtoggle">▲</span></div>
    <div id="logbody"></div>
  </div>

  <div id="handwrap"><div id="hand"></div></div>

  <div id="controls">
    <div id="turnind">—</div>
    <button id="passbtn">PASS ROUND</button>
  </div>
</div>

<div id="hudwrap"><div id="hudcol"><div id="hud">
  <div class="hud-plaque" id="hud-o"><span class="hud-total" id="ototal">0</span></div>
  <div class="hud-pips" id="pips"></div>
  <div class="hud-plaque" id="hud-p"><span class="hud-total" id="ptotal">0</span></div>
</div></div></div>

<div id="banner" class="hidden"><span class="txt"></span></div>

<div class="overlay hidden" id="inspect">
  <div class="inspect-card" id="inspectCard"></div>
  <div id="inspectFooter"></div>
</div>

<div class="overlay hidden" id="targeting"><div class="modal">
  <h3 id="tgtitle">Choose a target</h3>
  <div class="opts" id="tgopts"></div>
  <button class="cancel" id="tgcancel">Cancel</button>
</div></div>

<div class="overlay hidden" id="gameover"><div class="modal">
  <h2 id="goh">VICTORY</h2><p id="gop"></p>
  <button onclick="startGame()">REMATCH ⚔</button>
</div></div>

<script>
/* ============================================================
   DIVYA YUDDHA — Rules Engine v0.1 (Deva mirror match)
   Headless, UI-agnostic. Runs in browser and Node.
   ============================================================ */
const RARITY_COLOR = { L:'#C9A84C', M:'#E74C3C', E:'#9B59B6', R:'#3498DB', U:'#27AE60', C:'#888888' };
const RARITY_NAME  = { L:'Legendary', M:'Mythic', E:'Epic', R:'Rare', U:'Uncommon', C:'Common' };

const DEVA_DECK_DEF = [
  // ---- HEROES (3) ----
  { id:'indra',   n:'Indra',          sub:'King of Devas',        t:'hero', p:7, r:'L', txt:'PASSIVE: All Deva Units gain +1 power while Indra is on the board.' },
  { id:'agni',    n:'Agni',           sub:'Flame of Sacrifice',   t:'hero', p:5, r:'E', txt:'TRIGGERED: Whenever any Mantra is played, deal 1 damage to a random enemy Unit.' },
  { id:'varuna',  n:'Varuna',         sub:'Lord of Oceans',       t:'hero', p:6, r:'E', txt:'PASSIVE: Opponent cannot play more than 1 Astra per round.' },
  // ---- UNITS (12) ----
  { id:'surya',   n:'Surya Dev',      sub:'Radiance of the Dawn', t:'unit', p:6, r:'E', txt:'ON PLAY: All other friendly Units gain +1 power.' },
  { id:'brihaspati',n:'Brihaspati',   sub:'Guru of the Gods',     t:'unit', p:5, r:'E', txt:'ON PLAY: Copy the effect of the last Mantra played by either player.' },
  { id:'vayu',    n:'Vayu',           sub:'The Invisible Force',  t:'unit', p:5, r:'R', txt:'ON PLAY: The highest power enemy Unit loses 2 power. (v0.1: swap omitted)' },
  { id:'vishwakarma',n:'Vishwakarma', sub:'Divine Architect',     t:'unit', p:4, r:'R', txt:'ON PLAY: Destroy the opponent\u2019s Artifact. Gain +2 power for each Artifact destroyed this game.' },
  { id:'kubera',  n:'Kubera',         sub:'Lord of Wealth',       t:'unit', p:3, r:'R', txt:'ON PLAY: Draw 2 cards. If both are Units they gain +1 power each.' },
  { id:'urvashi', n:'Urvashi',        sub:'The Eternal Apsara',   t:'unit', p:4, r:'R', txt:'ON PLAY: Opponent discards their highest power card from hand.' },
  { id:'yama',    n:'Yama',           sub:'Lord of Dharma',       t:'unit', p:6, r:'E', txt:'PASSIVE: Destroyed friendly Units leave a 1-power ghost token behind.' },
  { id:'saraswati',n:'Saraswati',     sub:'Voice of Creation',    t:'unit', p:4, r:'R', txt:'ON PLAY: Look at opponent\u2019s hand. Lock one card \u2014 it cannot be played this round.' },
  { id:'ashwini', n:'Ashwini Kumars', sub:'Twin Healers',         t:'unit', p:3, r:'U', txt:'ON PLAY: Restore 2 power to the most wounded friendly Unit.' },
  { id:'marut',   n:'Marut',          sub:'Storm Soldier',        t:'unit', p:3, r:'C', txt:'ON PLAY: If Vayu is on your board, gain +3 power.' },
  { id:'gandharva',n:'Gandharva',     sub:'Celestial Warrior',    t:'unit', p:2, r:'C', txt:'ON PLAY: If 3+ friendly Units are on the board, gain +2 power.' },
  { id:'soldier', n:'Deva Soldier',   sub:'Keeper of Order',      t:'unit', p:2, r:'C', txt:'PASSIVE: With Indra on board, +1 power at the start of each round. (design flag: see notes)' },
  // ---- ASTRAS (3) ----
  { id:'vajra',   n:'Vajra',          sub:'Thunderbolt of Indra', t:'astra', p:0, r:'L', txt:'Destroy one enemy Unit with power 6+. If Indra is on your board: destroy ANY enemy Unit.' },
  { id:'brahmastra',n:'Brahmastra',   sub:'The Ultimate Weapon',  t:'astra', p:0, r:'M', txt:'Destroy ALL enemy Units. Overrides all shields and immunities.' },
  { id:'sudarshana',n:'Sudarshana Chakra',sub:'Disc of Vishnu',   t:'astra', p:0, r:'M', txt:'Remove one enemy Hero for this round. It returns next round at half power.' },
  // ---- MANTRAS (2) ----
  { id:'gayatri', n:'Gayatri Mantra', sub:'Light of All Worlds',  t:'mantra', p:0, r:'R', txt:'Revive the lowest power friendly Unit from your discard pile at full power, with Dharma Shield.' },
  { id:'pavamana',n:'Pavamana',       sub:'The Purifying Chant',  t:'mantra', p:0, r:'U', txt:'Heal all wounded friendly Units to full. Each healed unit gains +1 power.' },
  // ---- ARTIFACTS (2) ----
  { id:'amrita',  n:'Amrita Kalasha', sub:'Vessel of Immortality',t:'artifact', p:0, r:'M', txt:'ON PLAY: Lowest friendly Unit gains +2 power. If it is destroyed this round it revives at 1 power. (v0.1 rework)' },
  { id:'kavacha', n:'Dharma Kavacha', sub:'Shield of Sacred Law', t:'artifact', p:0, r:'R', txt:'PASSIVE: Dharma Shield protects TWO Units instead of one.' },
];

let UID = 1;
function mkCard(def){ return { ...def, uid: UID++, power: def.p, base: def.p, ghost:false, lockedRound:0, aegis:false, revivedShield:false }; }
function shuffle(a, rng){ for (let i=a.length-1;i>0;i--){ const j=Math.floor(rng()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function mkPlayer(name, rng){
  const deck = shuffle(DEVA_DECK_DEF.map(mkCard), rng);
  const hand = deck.splice(0,10);
  return { name, deck, hand, discard:[],
    units:[], heroes:[], artifact:null,
    passed:false, roundWins:0,
    heroPlayedThisRound:false, astrasThisRound:0,
    artifactsDestroyedByMe:0, removedHeroes:[] };
}

function newGame(opts={}){
  const rng = opts.rng || Math.random;
  const g = {
    rng, round:1, over:false, winner:null,
    players:[ mkPlayer(opts.p0||'You', rng), mkPlayer(opts.p1||'Opponent', rng) ],
    turn: rng()<0.5?0:1, lastMantra:null, log:[],
    roundHistory:[],
  };
  g.firstThisRound = g.turn;
  { const nm=g.players[g.turn].name; log(g, `Coin flip \u2014 ${nm} ${nm==='You'?'play':'plays'} first.`); }
  return g;
}

function log(g, msg){ g.log.push({ round:g.round, msg }); }

/* ---------- power & shields ---------- */
function indraOnBoard(pl){ return pl.heroes.some(h=>h.id==='indra'); }
function effPower(g, pi, c){
  if (c.t==='hero') return c.power;
  let p = c.power;
  if (!c.ghost && indraOnBoard(g.players[pi])) p += 1;   // Indra aura
  return p;
}
function shieldedSet(g, pi){
  // v0.1 auto-shield: highest effective-power unit(s) hold Dharma Shield.
  const pl = g.players[pi];
  const n = pl.artifact && pl.artifact.id==='kavacha' ? 2 : 1;
  const real = pl.units.filter(u=>!u.ghost);
  const sorted = [...real].sort((a,b)=>effPower(g,pi,b)-effPower(g,pi,a));
  const set = new Set(sorted.slice(0,n).map(u=>u.uid));
  for (const u of real) if (u.revivedShield) set.add(u.uid); // Gayatri revival shield
  return set;
}
function isShielded(g, pi, c){ return shieldedSet(g, pi).has(c.uid); }
function totalPower(g, pi){
  const pl = g.players[pi];
  let t = 0;
  for (const h of pl.heroes) t += effPower(g, pi, h);
  for (const u of pl.units)  t += effPower(g, pi, u);
  return t;
}

/* ---------- destruction / damage ---------- */
function destroyUnit(g, pi, unit, cause){
  const pl = g.players[pi];
  const ix = pl.units.indexOf(unit); if (ix<0) return;
  pl.units.splice(ix,1);
  log(g, `${unit.n} is destroyed (${cause}).`);
  if (unit.aegis && !unit.ghost){
    unit.aegis=false; unit.power=1;
    pl.units.push(unit);
    log(g, `Amrita Kalasha revives ${unit.n} at 1 power!`);
    return;
  }
  if (!unit.ghost){
    pl.discard.push(unit);
    if (pl.units.some(u=>u.id==='yama')){
      pl.units.push({ uid:UID++, id:'ghost', n:`Ghost of ${unit.n}`, sub:'Yama\u2019s token', t:'unit', p:1, r:'C', power:1, base:1, ghost:true, txt:'' });
      log(g, `Yama binds a 1-power ghost of ${unit.n} to the row.`);
    }
  }
}
function damageUnit(g, pi, unit, amt, cause){
  unit.power -= amt;
  log(g, `${unit.n} takes ${amt} damage (${cause}) \u2192 ${Math.max(unit.power,0)}.`);
  if (unit.power<=0) destroyUnit(g, pi, unit, cause);
}

/* ---------- mantra effects (shared for Brihaspati copy) ---------- */
function castMantra(g, pi, id){
  const pl=g.players[pi];
  if (id==='gayatri'){
    const units = pl.discard.filter(c=>c.t==='unit');
    if (!units.length){ log(g,'Gayatri Mantra: no fallen Unit to revive.'); return; }
    const lowest = units.reduce((a,b)=>a.base<=b.base?a:b);
    pl.discard.splice(pl.discard.indexOf(lowest),1);
    lowest.power = lowest.base; lowest.revivedShield = true;
    pl.units.push(lowest);
    log(g, `Gayatri Mantra revives ${lowest.n} at full power, shielded.`);
  } else if (id==='pavamana'){
    let healed=0;
    for (const u of pl.units){ if (!u.ghost && u.power<u.base){ u.power=u.base+1; healed++; } }
    log(g, healed?`Pavamana purifies ${healed} unit(s): healed +1.`:'Pavamana: nothing to purify.');
  }
  // Agni trigger — any mantra, either player
  for (let s=0;s<2;s++){
    if (g.players[s].heroes.some(h=>h.id==='agni')){
      const foes = g.players[1-s].units.filter(u=>!u.ghost);
      if (foes.length){
        const t = foes[Math.floor(g.rng()*foes.length)];
        log(g, `Agni (${g.players[s].name}) flares at the mantra!`);
        damageUnit(g, 1-s, t, 1, 'Agni');
      }
    }
  }
  g.lastMantra = id;
}

/* ---------- legality ---------- */
function playableIndices(g, pi){
  const pl=g.players[pi], opp=g.players[1-pi], res=[];
  pl.hand.forEach((c,i)=>{
    if (c.lockedRound===g.round) return;
    if (c.t==='hero' && pl.heroPlayedThisRound) return;
    if (c.t==='astra'){
      if (opp.heroes.some(h=>h.id==='varuna') && pl.astrasThisRound>=1) return;
      if (c.id==='vajra'){
        const indra = indraOnBoard(pl);
        const targets = opp.units.filter(u=>!u.ghost && !isShielded(g,1-pi,u) && (indra || effPower(g,1-pi,u)>=6));
        if (!targets.length) return;
      }
      if (c.id==='sudarshana' && !opp.heroes.length) return;
      if (c.id==='brahmastra' && !opp.units.some(u=>!u.ghost)) return;
    }
    if (c.t==='mantra' && c.id==='gayatri' && !pl.discard.some(x=>x.t==='unit')) return;
    res.push(i);
  });
  return res;
}

/* Targets a card needs (for UI): returns {kind, options} or null */
function targetSpec(g, pi, card){
  const opp=g.players[1-pi];
  if (card.id==='vajra'){
    const indra = indraOnBoard(g.players[pi]);
    return { kind:'enemyUnit', options: opp.units.filter(u=>!u.ghost && !isShielded(g,1-pi,u) && (indra||effPower(g,1-pi,u)>=6)) };
  }
  if (card.id==='sudarshana') return { kind:'enemyHero', options:[...opp.heroes] };
  if (card.id==='saraswati' && opp.hand.length) return { kind:'oppHandCard', options:[...opp.hand] };
  return null;
}

/* ---------- play a card ---------- */
function playCard(g, pi, handIndex, targetUid=null){
  const pl=g.players[pi], opp=g.players[1-pi];
  const c = pl.hand[handIndex];
  if (!c) throw new Error('bad hand index');
  pl.hand.splice(handIndex,1);
  log(g, `${pl.name} plays ${c.n}${c.sub?' \u2014 '+c.sub:''}.`);

  if (c.t==='hero'){
    pl.heroes.push(c); pl.heroPlayedThisRound=true;
  }
  else if (c.t==='unit'){
    pl.units.push(c);
    switch(c.id){
      case 'surya': for (const u of pl.units) if (u!==c && !u.ghost) u.power+=1;
        log(g,'Surya Dev: all other friendly Units +1.'); break;
      case 'vayu': {
        const foes=opp.units.filter(u=>!u.ghost);
        if (foes.length){ const t=foes.reduce((a,b)=>effPower(g,1-pi,a)>=effPower(g,1-pi,b)?a:b); damageUnit(g,1-pi,t,2,'Vayu'); }
        break; }
      case 'vishwakarma':
        if (opp.artifact){ log(g,`Vishwakarma unmakes ${opp.artifact.n}.`); opp.discard.push(opp.artifact); opp.artifact=null; pl.artifactsDestroyedByMe++; }
        if (pl.artifactsDestroyedByMe>0){ c.power += 2*pl.artifactsDestroyedByMe; log(g,`Vishwakarma stands at ${c.power}.`); }
        break;
      case 'kubera': {
        const drawn = pl.deck.splice(0,2); pl.hand.push(...drawn);
        log(g, `Kubera draws ${drawn.length} card(s).`);
        if (drawn.length===2 && drawn.every(d=>d.t==='unit')){ drawn.forEach(d=>d.power+=1); log(g,'Both were Units \u2014 each gains +1.'); }
        break; }
      case 'urvashi': {
        const withP = opp.hand.filter(h=>h.p>0);
        if (withP.length){ const t=withP.reduce((a,b)=>a.p>=b.p?a:b); opp.hand.splice(opp.hand.indexOf(t),1); opp.discard.push(t);
          log(g,`Urvashi\u2019s glance \u2014 ${opp.name} discards ${t.n}.`); }
        break; }
      case 'saraswati': {
        let t = targetUid!=null ? opp.hand.find(h=>h.uid===targetUid) : null;
        if (!t && opp.hand.length) t = opp.hand.reduce((a,b)=>a.p>=b.p?a:b);
        if (t){ t.lockedRound=g.round; log(g,`Saraswati locks ${t.n} for this round.`); }
        break; }
      case 'ashwini': {
        const wounded = pl.units.filter(u=>!u.ghost && u.power<u.base);
        if (wounded.length){ const t=wounded.reduce((a,b)=>(a.base-a.power)>=(b.base-b.power)?a:b);
          t.power=Math.min(t.base, t.power+2); log(g,`Ashwini Kumars heal ${t.n} \u2192 ${t.power}.`); }
        else log(g,'Ashwini Kumars: no wounds to heal.');
        break; }
      case 'marut': if (pl.units.some(u=>u.id==='vayu')){ c.power+=3; log(g,'Marut rides Vayu\u2019s wind: +3.'); } break;
      case 'gandharva': if (pl.units.filter(u=>!u.ghost).length>=4){ c.power+=2; log(g,'Gandharva\u2019s harmony: +2.'); } break; // itself + 3 others
      case 'brihaspati':
        if (g.lastMantra){ log(g,`Brihaspati repeats ${g.lastMantra==='gayatri'?'Gayatri Mantra':'Pavamana'}.`); castMantra(g, pi, g.lastMantra); }
        else log(g,'Brihaspati: no Mantra has been spoken yet.');
        break;
    }
  }
  else if (c.t==='astra'){
    pl.astrasThisRound++;
    if (c.id==='vajra'){
      const spec = targetSpec(g, pi, c);
      let t = targetUid!=null ? spec.options.find(u=>u.uid===targetUid) : null;
      if (!t) t = spec.options.reduce((a,b)=>effPower(g,1-pi,a)>=effPower(g,1-pi,b)?a:b);
      log(g,'Vajra falls!'); destroyUnit(g, 1-pi, t, 'Vajra');
    } else if (c.id==='brahmastra'){
      log(g,'BRAHMASTRA. The earth remembers, and trembles.');
      for (const u of [...opp.units]) destroyUnit(g, 1-pi, u, 'Brahmastra');
    } else if (c.id==='sudarshana'){
      let t = targetUid!=null ? opp.heroes.find(h=>h.uid===targetUid) : null;
      if (!t) t = opp.heroes.reduce((a,b)=>a.power>=b.power?a:b);
      opp.heroes.splice(opp.heroes.indexOf(t),1);
      opp.removedHeroes.push(t);
      log(g,`Sudarshana Chakra removes ${t.n} for this round.`);
    }
    pl.discard.push(c);
  }
  else if (c.t==='mantra'){ castMantra(g, pi, c.id); pl.discard.push(c); }
  else if (c.t==='artifact'){
    if (pl.artifact){ pl.discard.push(pl.artifact); log(g,`${pl.artifact.n} is replaced.`); }
    pl.artifact = c;
    if (c.id==='amrita'){
      const real=pl.units.filter(u=>!u.ghost);
      if (real.length){ const t=real.reduce((a,b)=>effPower(g,pi,a)<=effPower(g,pi,b)?a:b);
        t.power+=2; t.aegis=true; log(g,`Amrita Kalasha blesses ${t.n}: +2, revives once if destroyed.`); }
    } else log(g,'Dharma Kavacha raised \u2014 two Units now shielded.');
  }
  afterAction(g, pi);
}

function pass(g, pi){
  const pl=g.players[pi];
  pl.passed=true;
  log(g, `${pl.name} passes.`);
  afterAction(g, pi);
}

function afterAction(g, pi){
  const a=g.players[0], b=g.players[1];
  if (a.passed && b.passed){ endRound(g); return; }
  const other = 1-pi;
  g.turn = g.players[other].passed ? pi : other;
}

/* ---------- round / match resolution ---------- */
function endRound(g){
  const t0=totalPower(g,0), t1=totalPower(g,1);
  log(g, `Round ${g.round} ends \u2014 ${g.players[0].name} ${t0} vs ${g.players[1].name} ${t1}.`);
  let winner=null;
  if (t0>t1) winner=0; else if (t1>t0) winner=1;
  if (winner!=null){ g.players[winner].roundWins++; log(g, `${g.players[winner].name} wins Round ${g.round}!`); }
  else log(g, 'The round is a draw \u2014 both sides bleed.');
  g.roundHistory.push({ round:g.round, t0, t1, winner });

  if (g.players[0].roundWins>=2 || g.players[1].roundWins>=2 || g.round>=3){
    g.over=true;
    if (g.players[0].roundWins>g.players[1].roundWins) g.winner=0;
    else if (g.players[1].roundWins>g.players[0].roundWins) g.winner=1;
    else g.winner=null;
    log(g, g.winner==null ? 'The match ends in a cosmic stalemate.' : `\u2694 ${g.players[g.winner].name} WINS THE MATCH ${g.players[g.winner].roundWins}\u2013${g.players[1-(g.winner)].roundWins}!`);
    return;
  }

  // board reset
  for (let s=0;s<2;s++){
    const pl=g.players[s];
    for (const u of pl.units) if (!u.ghost){ u.revivedShield=false; u.aegis=false; u.power=u.base===u.power?u.power:u.power; pl.discard.push(u); }
    pl.units=[];
    if (pl.artifact){ pl.discard.push(pl.artifact); pl.artifact=null; }
    // removed heroes return at half power
    for (const h of pl.removedHeroes){ h.power=Math.max(1, Math.ceil(h.power/2)); pl.heroes.push(h); log(g,`${h.n} returns at ${h.power} power.`); }
    pl.removedHeroes=[];
    pl.passed=false; pl.heroPlayedThisRound=false; pl.astrasThisRound=0;
    const drawn = pl.deck.splice(0,2); pl.hand.push(...drawn);
    for (const c of pl.hand) c.lockedRound=0;
  }
  g.round++;
  const prev = g.roundHistory[g.roundHistory.length-1];
  g.turn = prev.winner!=null ? prev.winner : g.firstThisRound;  // round winner leads (design note)
  g.firstThisRound = g.turn;
  log(g, `\u2014\u2014 Round ${g.round} begins. Each side draws 2. ${g.players[g.turn].name} leads. \u2014\u2014`);
}

/* ---------- AI ---------- */
function aiScoreCard(g, pi, c){
  const pl=g.players[pi], opp=g.players[1-pi];
  let s = c.p;
  switch(c.id){
    case 'indra': s += Math.min(pl.units.filter(u=>!u.ghost).length, 5) + 2; break;
    case 'varuna': s += 2; break;
    case 'agni': s += 1; break;
    case 'surya': s += pl.units.filter(u=>!u.ghost).length; break;
    case 'marut': if (pl.units.some(u=>u.id==='vayu')) s += 3; break;
    case 'gandharva': if (pl.units.filter(u=>!u.ghost).length>=3) s += 2; break;
    case 'kubera': s += 2.5; break;
    case 'urvashi': s += 2; break;
    case 'saraswati': s += opp.hand.length? 2:0; break;
    case 'vayu': s += opp.units.some(u=>!u.ghost)? 2:0; break;
    case 'vishwakarma': s += opp.artifact? 3:0; break;
    case 'yama': s += 1.5; break;
    case 'brihaspati': s += g.lastMantra? 2:0; break;
    case 'vajra': { const spec=targetSpec(g,pi,c); s = spec.options.length? 1+Math.max(...spec.options.map(u=>effPower(g,1-pi,u))) : -99; break; }
    case 'brahmastra': s = opp.units.filter(u=>!u.ghost).reduce((k,u)=>k+effPower(g,1-pi,u),0); break;
    case 'sudarshana': s = opp.heroes.length? 2+Math.max(...opp.heroes.map(h=>h.power))/2 : -99; break;
    case 'gayatri': { const u=pl.discard.filter(x=>x.t==='unit'); s = u.length? 1+Math.min(...u.map(x=>x.base))+2 : -99; break; }
    case 'pavamana': s = pl.units.filter(u=>!u.ghost&&u.power<u.base).length*2 - 1; break;
    case 'amrita': s = pl.units.some(u=>!u.ghost)? 2.5 : -1; break;
    case 'kavacha': s = pl.units.filter(u=>!u.ghost).length>=2? 2 : 0; break;
  }
  return s;
}

function aiMove(g, pi){
  const pl=g.players[pi], opp=g.players[1-pi];
  const idxs = playableIndices(g, pi);
  const my=totalPower(g,pi), their=totalPower(g,1-pi);
  const lead = my-their;
  const mustWin = opp.roundWins===1;               // losing this round loses the match
  const wantWin = pl.roundWins===1;                // winning this round wins the match

  if (!idxs.length) return { pass:true };

  if (opp.passed){
    if (lead>0) return { pass:true };
    // find cheapest single play that flips the round
    let best=null;
    for (const i of idxs){
      const c=pl.hand[i];
      const gain = c.t==='unit'||c.t==='hero' ? c.p + (indraOnBoard(pl)&&c.t==='unit'?1:0) : aiScoreCard(g,pi,c)-c.p;
      if (gain > -lead){ if (!best || pl.hand[best].p>c.p) best=i; }
    }
    if (best!=null) return { play:best };
    // can't flip with one card: fight on if the match is at stake, else concede the round
    if (mustWin){ const i = idxs.reduce((a,b)=> aiScoreCard(g,pi,pl.hand[a])>=aiScoreCard(g,pi,pl.hand[b])?a:b); return { play:i }; }
    return { pass:true };
  }

  // opponent still active
  if (!mustWin && !wantWin && g.round===1 && lead>=10 && pl.hand.length<=opp.hand.length-1) return { pass:true }; // card-advantage bluff
  if (!mustWin && lead<=-14 && g.round<3) return { pass:true };  // concede a lost round, preserve cards

  const i = idxs.reduce((a,b)=> aiScoreCard(g,pi,pl.hand[a])>=aiScoreCard(g,pi,pl.hand[b])?a:b);
  return { play:i };
}

function aiTakeTurn(g, pi){
  const mv = aiMove(g, pi);
  if (mv.pass) pass(g, pi); else playCard(g, pi, mv.play, null);
}

/* ---------- Node export & simulation harness ---------- */
if (typeof module!=='undefined'){
  module.exports = { newGame, playCard, pass, aiMove, aiTakeTurn, totalPower, playableIndices, targetSpec, effPower, isShielded, DEVA_DECK_DEF, RARITY_COLOR, RARITY_NAME };
}

</script>
<script>
const $=id=>document.getElementById(id);
const TYPE_ICON={hero:'👑',unit:'⚔',astra:'🔱',mantra:'🕉',artifact:'🧿'};
const RAR_CLASS={ L:'rar-L', M:'rar-M', E:'rar-E' };
let G=null, pendingPlay=null, aiTimer=null, seenLog=0;
let inspectContext=null, pendingFly=null, knownUids=new Set(), lastPowers={}, lastRoundLen=0, focusRaf=0;
let lastTotals={o:null,p:null};
const reducedMotion=()=> window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const rarClass=c=> RAR_CLASS[c.r]||'';
function pulsePlaque(el){ if(reducedMotion())return; el.classList.remove('pulse'); void el.offsetWidth; el.classList.add('pulse'); }

/* Scale board minis so both rows of a half always fit fully — never clipped.
   Each half gets a --mini-h; only below the 56px floor do we fall back to
   within-zone scrolling (with a fade affordance via .scrollzone). */
const MINI_MIN=56, MINI_MAX=96, ROW_PAD=6, EMPTY_ROW=28;
function sizeBoard(){
  for (const side of ['opp','me']){
    const half=document.querySelector('.half.'+side); if(!half) continue;
    const zbody=half.querySelector('.zbody');
    const rows=[...half.querySelectorAll('.row')];
    const art=half.querySelector('.art-slot');
    const cs=getComputedStyle(zbody);
    const padV=parseFloat(cs.paddingTop)+parseFloat(cs.paddingBottom);
    const gap=parseFloat(cs.rowGap||cs.gap)||0;
    const cardRows=rows.filter(r=>r.querySelector('.bc'));
    const emptyRows=rows.filter(r=>!r.querySelector('.bc'));
    const nRows=cardRows.length||1;
    const artH=art?art.getBoundingClientRect().height:0;
    const childGaps=Math.max(0, rows.length+(artH>1?1:0)-1)*gap;
    const content=zbody.clientHeight - padV - artH - childGaps - emptyRows.length*EMPTY_ROW;
    const per=Math.floor((content - nRows*ROW_PAD)/nRows) - 1; // -1 safety
    if (per>=MINI_MIN){ half.style.setProperty('--mini-h', Math.min(per, MINI_MAX)+'px'); half.classList.remove('scrollzone'); }
    else { half.style.setProperty('--mini-h', MINI_MIN+'px'); half.classList.add('scrollzone'); }
  }
}

function startGame(){
  if (aiTimer) clearTimeout(aiTimer);
  G=newGame({p0:'You',p1:'Opponent'}); seenLog=0;
  knownUids=new Set(); lastPowers={}; lastRoundLen=0; pendingFly=null; inspectContext=null; lastTotals={o:null,p:null};
  ['gameover','targeting','inspect','banner'].forEach(id=>$(id).classList.add('hidden'));
  $('logbody').innerHTML=''; $('loglast').textContent=''; $('logdrawer').classList.remove('open');
  makeEmbers();
  render(); pump();
}

function makeEmbers(){
  const box=$('embers'); box.innerHTML=''; if (reducedMotion()) return;
  for (let i=0;i<12;i++){
    const e=document.createElement('div'); e.className='ember';
    const s=(3+Math.random()*3).toFixed(1);
    e.style.left=(4+Math.random()*92)+'%';
    e.style.width=s+'px'; e.style.height=s+'px';
    e.style.animationDuration=(7+Math.random()*7).toFixed(1)+'s';
    e.style.animationDelay=(-Math.random()*12).toFixed(1)+'s';
    box.appendChild(e);
  }
}

/* Real card art lives in assets/cards/, named per the GDD convention:
   Devas_{Type}_{Name}_P{printedPower}_r{RarityName}_png.png
   e.g. Devas_Hero_Indra_P7_rLegendary_png.png, Devas_Unit_SuryaDev_P6_rEpic_png.png
   Name strips spaces (CamelCase), power is the printed/base power, rarity is the full name.
   We attempt to load it and only reveal it once it actually loads; on error the
   text-design card stays visible, so cards without art yet fall back gracefully. */
function cardArtSrc(c){
  const type = c.t.charAt(0).toUpperCase()+c.t.slice(1);
  const name = c.n.replace(/ /g,'');
  return `assets/cards/Devas_${type}_${name}_P${c.base}_r${RARITY_NAME[c.r]}_png.png`;
}
function attachArt(el, c){
  if (c.ghost || c.id==='ghost') return;            // Yama tokens have no art
  const img=new Image();
  img.className='art'; img.alt=c.n;
  img.onload=()=>{ el.insertBefore(img, el.firstChild); el.classList.add('has-art'); };
  img.src=cardArtSrc(c);
}

/* ---------- board minis (art-first, medallion power) ---------- */
function boardCard(c, pi, targetSet){
  const d=document.createElement('div');
  d.className='bc'+(c.t==='hero'?' hero':'')+(c.ghost?' ghostc':'');
  d.dataset.uid=c.uid;
  const ep=effPower(G,pi,c);
  const sh=!c.ghost && c.t==='unit' && isShielded(G,pi,c);
  let state='', mark='';
  if(!c.ghost){ if(ep>c.base){ state='buffed'; mark='▲'; } else if(c.power<c.base){ state='hurt'; mark='▼'; } }
  d.innerHTML=
    `<div class="mini-name">${c.n}</div>`+
    (sh?'<div class="shieldbadge">🛡</div>':'')+
    `<div class="medallion ${state}">${ep}${mark?`<span class="mark">${mark}</span>`:''}</div>`;
  attachArt(d, c);
  if (targetSet && targetSet.has(c.uid)){ d.classList.add('targetable'); d.onclick=()=>resolveTarget(c.uid); }
  else d.onclick=()=>{ if(!pendingPlay) openInspect(c, pi, null); };
  if (!knownUids.has(c.uid) && !(pendingFly && pendingFly.uid===c.uid)) d.classList.add('landing');
  return d;
}

function fillRow(el, cards, pi, targetSet){
  el.innerHTML='';
  if(!cards.length){ el.classList.add('empty'); const e=document.createElement('div'); e.className='slot-empty'; e.textContent='☀'; el.appendChild(e); return; }
  el.classList.remove('empty');
  for (const c of cards) el.appendChild(boardCard(c,pi,targetSet));
}

function setArtChip(id, artifact){
  const el=$(id);
  if (artifact){ el.textContent='🧿 '+artifact.n; el.classList.remove('hidden'); }
  else el.classList.add('hidden');
}

function render(targetSet){
  const me=G.players[0], op=G.players[1];
  $('rnum').textContent=G.round;
  $('pips').innerHTML =
    '<span class="pip-w">'+'★'.repeat(me.roundWins)+'</span><span class="pip-l">'+'★'.repeat(2-me.roundWins)+'</span>'+
    ' · <span class="pip-w">'+'★'.repeat(op.roundWins)+'</span><span class="pip-l">'+'★'.repeat(2-op.roundWins)+'</span>';
  $('ohand').textContent=op.hand.length; $('odeck').textContent=op.deck.length; $('pdeck').textContent=me.deck.length;
  $('opassed').textContent=op.passed?' · PASSED':''; $('ppassed').textContent=me.passed?' · PASSED':'';
  const t0=totalPower(G,0), t1=totalPower(G,1);
  $('ptotal').textContent=t0; $('ototal').textContent=t1;
  const hudO=$('hud-o'), hudP=$('hud-p');
  hudO.classList.toggle('leading', t1>t0); hudP.classList.toggle('leading', t0>t1);
  if (lastTotals.o!=null && t1!==lastTotals.o) pulsePlaque(hudO);
  if (lastTotals.p!=null && t0!==lastTotals.p) pulsePlaque(hudP);
  lastTotals={o:t1, p:t0};
  fillRow($('oheroes'), op.heroes, 1, targetSet);
  fillRow($('ounits'),  op.units,  1, targetSet);
  fillRow($('punits'),  me.units,  0);
  fillRow($('pheroes'), me.heroes, 0);
  setArtChip('oart', op.artifact); setArtChip('part', me.artifact);
  sizeBoard();   // scale minis so nothing is ever clipped

  // hand carousel
  const hand=$('hand'); hand.innerHTML='';
  const play=new Set(playableIndices(G,0));
  const myTurn = G.turn===0 && !me.passed && !G.over;
  me.hand.forEach((c,i)=>{
    const d=document.createElement('div');
    const ok = myTurn && play.has(i);
    d.className='hc '+rarClass(c)+(ok?'':' dead');
    d.innerHTML=`<div class="cardtext"><div class="nm">${c.n}</div><div class="ty">${TYPE_ICON[c.t]} ${c.t} · ${RARITY_NAME[c.r]}</div><div class="fx">${c.txt}</div></div>${c.p>0?`<div class="pw">${c.p}</div>`:''}${c.lockedRound===G.round?'<div class="lockicon">🔒</div>':''}`;
    attachArt(d, c);
    d.onclick=()=>openInspect(c, 0, ok?i:-1);
    hand.appendChild(d);
  });
  updateFocus();

  $('passbtn').disabled=!myTurn;
  $('turnind').textContent = G.over?'MATCH OVER': myTurn?'YOUR TURN': me.passed&&op.passed?'—': (G.turn===1?'OPPONENT…':'…');
  $('turnind').className = myTurn?'you':'';

  // log body + collapsed last line
  const lb=$('logbody');
  for (; seenLog<G.log.length; seenLog++){
    const l=G.log[seenLog]; const p=document.createElement('div');
    p.className = l.msg.startsWith('You')?'me': l.msg.startsWith('Opponent')?'foe':'sys';
    p.textContent=l.msg; lb.appendChild(p);
  }
  lb.scrollTop=lb.scrollHeight;
  if (G.log.length) $('loglast').textContent=G.log[G.log.length-1].msg;

  // juice: floating combat text for power changes since last render
  spawnFloaters();
  knownUids = boardUidSet();

  // consume pending fly-to-slot (human play)
  if (pendingFly){ const el=$('field').querySelector(`.bc[data-uid="${pendingFly.uid}"]`); flyClone(pendingFly.rect, el); pendingFly=null; }

  // round-end banner (skip on match over — gameover modal takes over)
  if (G.roundHistory.length>lastRoundLen){ if(!G.over) showRoundBanner(); lastRoundLen=G.roundHistory.length; }

  if (G.over) showGameOver();
}

/* ---------- board power tracking / floaters ---------- */
function boardUnits(){ const out=[]; for(const pi of [0,1]){ const pl=G.players[pi]; for(const u of pl.units) out.push([pi,u]); for(const h of pl.heroes) out.push([pi,h]); } return out; }
function boardUidSet(){ const s=new Set(); for(const [,c] of boardUnits()) s.add(c.uid); return s; }
function spawnFloaters(){
  const cur={};
  for(const [pi,c] of boardUnits()){
    const ep=effPower(G,pi,c); cur[c.uid]=ep;
    if ((c.uid in lastPowers) && lastPowers[c.uid]!==ep){
      const el=$('field').querySelector(`.bc[data-uid="${c.uid}"]`);
      if (el) floatText(el, ep-lastPowers[c.uid]);
    }
  }
  lastPowers=cur;
}
function floatText(el, delta){
  if (reducedMotion()) return;
  const r=el.getBoundingClientRect();
  const f=document.createElement('div');
  f.className='floater '+(delta>0?'up':'down');
  f.textContent=(delta>0?'+':'')+delta;
  f.style.left=(r.left+r.width/2-9)+'px'; f.style.top=(r.top+6)+'px';
  document.body.appendChild(f);
  setTimeout(()=>f.remove(), 620);
}
function flyClone(rect, destEl){
  const flash=el=>{ if(el){ el.classList.remove('landing'); void el.offsetWidth; el.classList.add('landing'); } };
  if (!rect || !destEl || reducedMotion()){ flash(destEl); return; }
  const dr=destEl.getBoundingClientRect();
  const clone=document.createElement('div');
  clone.style.cssText=`position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;height:${rect.height}px;`+
    `border-radius:12px;background:linear-gradient(#2a1e0a,#140f06);border:2px solid #E8C874;z-index:75;pointer-events:none;`+
    `box-shadow:0 8px 24px rgba(0,0,0,.6);transition:left .26s ease-out,top .26s ease-out,width .26s ease-out,height .26s ease-out,opacity .26s ease-out`;
  document.body.appendChild(clone);
  destEl.style.visibility='hidden';
  requestAnimationFrame(()=>{ clone.style.left=dr.left+'px'; clone.style.top=dr.top+'px'; clone.style.width=dr.width+'px'; clone.style.height=dr.height+'px'; clone.style.opacity='.5'; });
  setTimeout(()=>{ clone.remove(); destEl.style.visibility='visible'; flash(destEl); }, 280);
}
function showRoundBanner(){
  const h=G.roundHistory[G.roundHistory.length-1];
  const res = h.winner==null?'ROUND DRAWN': h.winner===0?'YOU WIN':'OPPONENT WINS';
  const w0=G.players[0].roundWins, w1=G.players[1].roundWins;
  const lead = w0>w1?' · YOU LEAD': w1>w0?' · YOU TRAIL':'';
  const b=$('banner'), t=b.querySelector('.txt');
  t.textContent=`ROUND ${h.round} — ${res}${lead}`;
  b.classList.remove('hidden');
  t.style.animation='none'; void t.offsetWidth; t.style.animation='bannerSweep 1.2s ease-out';
  clearTimeout(b._t); b._t=setTimeout(()=>b.classList.add('hidden'), 1400);
}

/* ---------- hand carousel focus ---------- */
function updateFocus(){
  const hand=$('hand'); const cards=[...hand.children]; if(!cards.length) return;
  const mid=hand.scrollLeft + hand.clientWidth/2;
  let best=null, bd=Infinity;
  for (const el of cards){ const c=el.offsetLeft+el.offsetWidth/2; const dd=Math.abs(c-mid); if(dd<bd){ bd=dd; best=el; } }
  for (const el of cards) el.classList.toggle('focus', el===best);
}

/* ---------- inspect overlay ---------- */
function openInspect(c, pi, handIndex){
  inspectContext={ card:c, handIndex };
  const card=$('inspectCard');
  card.className='inspect-card '+rarClass(c);
  const live = pi!=null && !c.ghost && (c.t==='unit'||c.t==='hero') ? effPower(G,pi,c) : c.p;
  const showPw = c.p>0 || c.t==='unit' || c.t==='hero';
  card.innerHTML=
    (showPw?`<div class="ipw">${live}</div>`:'')+
    `<div class="itext"><div class="inm">${c.n}</div>`+
    (c.sub?`<div class="isub">${c.sub}</div>`:'')+
    `<div class="ity">${TYPE_ICON[c.t]||''} ${c.t} · ${RARITY_NAME[c.r]}</div>`+
    `<div class="ifx">${c.txt||''}</div></div>`;
  attachArt(card, c);
  const foot=$('inspectFooter');
  if (handIndex!=null && handIndex>=0){
    foot.innerHTML='<div class="inspect-actions"><button class="ibtn-play">PLAY ⚔</button><button class="ibtn-cancel">CANCEL</button></div>';
    foot.querySelector('.ibtn-play').onclick=()=>{ const r=$('inspectCard').getBoundingClientRect(); closeInspect(); startPlay(handIndex, r); };
    foot.querySelector('.ibtn-cancel').onclick=closeInspect;
  } else {
    foot.innerHTML=`<div class="inspect-hint">${handIndex===-1?'not playable now · tap to dismiss':'tap anywhere to dismiss'}</div>`;
  }
  $('inspect').classList.remove('hidden');
}
function closeInspect(){ $('inspect').classList.add('hidden'); inspectContext=null; }

/* ---------- play flow ---------- */
function doPlay(i, uid, srcRect){
  const c=G.players[0].hand[i];
  pendingFly = (srcRect && c) ? { rect:srcRect, uid:c.uid } : null;
  playCard(G,0,i,uid); render(); pump();
}

function startPlay(i, srcRect){
  const c=G.players[0].hand[i]; if(!c) return;
  const spec=targetSpec(G,0,c);
  if (spec && spec.options.length){
    pendingPlay={ index:i, spec, srcRect };
    if (spec.kind==='oppHandCard'){
      $('tgtitle').textContent='Saraswati sees all — lock one card in the opponent\u2019s hand:';
      const box=$('tgopts'); box.innerHTML='';
      spec.options.forEach(o=>{ const b=document.createElement('div'); b.className='opt';
        b.innerHTML=`<div class="nm">${o.n}</div><div class="dt">${o.t}${o.p?` · power ${o.p}`:''}</div>`;
        b.onclick=()=>resolveTarget(o.uid); box.appendChild(b); });
      $('targeting').classList.remove('hidden');
    } else {
      $('tgtitle').textContent = c.id==='vajra' ? 'Vajra — strike which enemy Unit?' : 'Sudarshana — remove which enemy Hero?';
      $('targeting').classList.add('hidden');
      render(new Set(spec.options.map(o=>o.uid)));
      showBoardTargetBar(c);
    }
    return;
  }
  doPlay(i, null, srcRect);
}

let targetBar=null;
function showBoardTargetBar(c){
  hideBoardTargetBar();
  targetBar=document.createElement('div');
  targetBar.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#241a08;border-top:1.5px solid #C9A84C;padding:calc(10px + env(safe-area-inset-bottom)) 10px 10px;text-align:center;font-family:Cinzel,serif;font-size:12px;color:#E8C874;z-index:82';
  targetBar.innerHTML=`${c.n}: tap a glowing target &nbsp; <button style="background:none;border:1px solid #8a7434;color:#cbbd96;border-radius:6px;padding:4px 10px;cursor:pointer" onclick="cancelTarget()">Cancel</button>`;
  document.body.appendChild(targetBar);
}
function hideBoardTargetBar(){ if(targetBar){ targetBar.remove(); targetBar=null; } }
function cancelTarget(){ pendingPlay=null; hideBoardTargetBar(); $('targeting').classList.add('hidden'); render(); }

function resolveTarget(uid){
  const pp=pendingPlay; if(!pp) return;
  pendingPlay=null; hideBoardTargetBar(); $('targeting').classList.add('hidden');
  doPlay(pp.index, uid, pp.srcRect);
}
$('tgcancel').onclick=cancelTarget;
$('passbtn').onclick=()=>{ if(G.turn===0&&!G.players[0].passed&&!G.over){ pass(G,0); render(); pump(); } };
$('loghead').onclick=()=>$('logdrawer').classList.toggle('open');
$('inspect').onclick=e=>{ if(e.target.id==='inspect' || e.target.closest('.inspect-hint')) closeInspect(); };
$('hand').addEventListener('scroll', ()=>{ if(focusRaf) return; focusRaf=requestAnimationFrame(()=>{ focusRaf=0; updateFocus(); }); });
window.addEventListener('resize', ()=>{ if(G){ sizeBoard(); updateFocus(); } });

function pump(){
  if (G.over) return;
  if (G.turn===1 && !G.players[1].passed){
    aiTimer=setTimeout(()=>{ aiTakeTurn(G,1); render(); pump(); }, 850);
  }
}

function showGameOver(){
  const me=G.players[0];
  $('goh').textContent = G.winner===0?'⚔ VICTORY ⚔': G.winner===1?'DEFEAT':'STALEMATE';
  $('gop').textContent = `Final: ${me.roundWins}–${G.players[1].roundWins} across ${G.roundHistory.length} rounds.`;
  $('gameover').classList.remove('hidden');
}

startGame();
</script>
